{# Formulario de filtros da pagina Ordens de Compra - diferente de
   _filtros.html (usado pela Central de Alertas): aqui nao ha filtro de
   revisado (essa pagina nao tem mais esse fluxo), so faturamento, status de
   alerta (Revisar/OK) e data de emissao. #}
<div class="secao">
  <h2>Filtros</h2>
  <form method="get" action="/detalhada" style="display:flex; flex-wrap:wrap; gap:14px; align-items:flex-end;">
    <div>
      <label for="f-faturamento" style="display:block; font-size:11px; color:var(--muted); margin-bottom:4px;">Faturamento</label>
      <select id="f-faturamento" name="faturamento" style="padding:7px 8px; border-radius:6px; border:1px solid var(--border); background:var(--surface-1); color:var(--text-primary);">
        <option value="todos" {% if filtro_faturamento == "todos" %}selected{% endif %}>Todos</option>
        <option value="faturar_repor" {% if filtro_faturamento == "faturar_repor" %}selected{% endif %}>Faturar e repor</option>
        <option value="faturar" {% if filtro_faturamento == "faturar" %}selected{% endif %}>Faturar</option>
        <option value="sem_instrucao" {% if filtro_faturamento == "sem_instrucao" %}selected{% endif %}>Sem instrucao</option>
      </select>
    </div>
    <div>
      <label for="f-status-alerta" style="display:block; font-size:11px; color:var(--muted); margin-bottom:4px;">Status</label>
      <select id="f-status-alerta" name="status_alerta" style="padding:7px 8px; border-radius:6px; border:1px solid var(--border); background:var(--surface-1); color:var(--text-primary);">
        <option value="todos" {% if filtro_status_alerta == "todos" %}selected{% endif %}>Todos</option>
        <option value="revisar" {% if filtro_status_alerta == "revisar" %}selected{% endif %}>Revisar</option>
        <option value="ok" {% if filtro_status_alerta == "ok" %}selected{% endif %}>OK</option>
      </select>
    </div>
    <div>
      <label for="f-ano" style="display:block; font-size:11px; color:var(--muted); margin-bottom:4px;">Ano (emissao)</label>
      <select id="f-ano" name="ano" style="padding:7px 8px; border-radius:6px; border:1px solid var(--border); background:var(--surface-1); color:var(--text-primary);">
        <option value="">Todos</option>
        {% for ano_disp in anos_disponiveis %}
        <option value="{{ ano_disp }}" {% if filtro_ano and filtro_ano|string == ano_disp %}selected{% endif %}>{{ ano_disp }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label for="f-mes" style="display:block; font-size:11px; color:var(--muted); margin-bottom:4px;">Mes (emissao)</label>
      <select id="f-mes" name="mes" style="padding:7px 8px; border-radius:6px; border:1px solid var(--border); background:var(--surface-1); color:var(--text-primary);">
        <option value="">Todos</option>
        {% for numero_mes, nome_mes in [(1,"Jan"),(2,"Fev"),(3,"Mar"),(4,"Abr"),(5,"Mai"),(6,"Jun"),(7,"Jul"),(8,"Ago"),(9,"Set"),(10,"Out"),(11,"Nov"),(12,"Dez")] %}
        <option value="{{ numero_mes }}" {% if filtro_mes == numero_mes %}selected{% endif %}>{{ nome_mes }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label for="f-dia" style="display:block; font-size:11px; color:var(--muted); margin-bottom:4px;">Dia (emissao)</label>
      <input id="f-dia" name="dia" type="number" min="1" max="31" value="{{ filtro_dia or '' }}" placeholder="Todos"
             style="width:70px; padding:7px 8px; border-radius:6px; border:1px solid var(--border); background:var(--surface-1); color:var(--text-primary);">
    </div>
    <div style="display:flex; gap:8px;">
      <button type="submit" class="btn">Filtrar</button>
      <a class="btn btn-secundario" style="text-decoration:none; display:inline-flex; align-items:center;" href="/detalhada">Limpar</a>
    </div>
  </form>
</div>
