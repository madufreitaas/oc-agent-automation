<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>{% block titulo %}Painel de Ordens de Compra{% endblock %}</title>
  <style>{{ css }}</style>
</head>
<body>
<div class="app-shell" id="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="marca-icone"></div>
      <div class="marca-texto">
        <p class="eyebrow">MDR Saude</p>
        <h1>OC Automation</h1>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item {% if aba_ativa == 'analytics' %}nav-item-ativo{% endif %}" href="/">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 13.5V2.5M2 13.5H14M5.5 13.5V8M9 13.5V5M12.5 13.5V3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Analytics
      </a>
      <a class="nav-item {% if aba_ativa == 'detalhada' %}nav-item-ativo{% endif %}" href="/detalhada">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="2.5" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.6"/><path d="M2 6.5H14M6 2.5V13.5" stroke="currentColor" stroke-width="1.6"/></svg>
        Ordens de Compra
      </a>
      <a class="nav-item {% if aba_ativa == 'alertas' %}nav-item-ativo{% endif %}" href="/alertas">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L1.5 13.5H14.5L8 2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M8 6.5V9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="8" cy="11.6" r="0.9" fill="currentColor"/></svg>
        Central de Alertas
      </a>
      <a class="nav-item {% if aba_ativa == 'auditoria' %}nav-item-ativo{% endif %}" href="/auditoria">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1.5L13.5 3.5V7.5C13.5 10.8 11.2 13 8 14.5C4.8 13 2.5 10.8 2.5 7.5V3.5L8 1.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M5.7 8L7.3 9.6L10.3 6.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Auditoria e Governanca
      </a>
    </nav>
    {% if usuario_email %}
    <div class="sidebar-user">
      {{ usuario_email }}<br>
      <a href="/logout">Sair</a>
    </div>
    {% endif %}
  </aside>

  <div class="main-area">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir menu" aria-controls="sidebar" aria-expanded="false">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4H14M2 8H14M2 12H14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <div>
          <h1>{% block titulo_pagina %}{% endblock %}</h1>
          <p class="subtitulo">{% block subtitulo_pagina %}{% endblock %}</p>
        </div>
      </div>
    </div>
    <div class="conteudo-pagina">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>

<script>
  // Um unico botao abre/fecha a sidebar nos dois modos de layout (ver
  // estilo_painel.py): acima de 860px ela recolhe no lugar (preferencia
  // guardada em localStorage, ja que cada pagina e um load completo, sem
  // SPA); abaixo disso vira um overlay que desliza por cima do conteudo
  // (estado de sessao, nao precisa persistir).
  (function () {
    var botao = document.getElementById('sidebar-toggle');
    var casca = document.getElementById('app-shell');
    var sidebar = document.getElementById('sidebar');
    var CHAVE = 'ocPainelSidebarFechada';
    var mediaMobile = window.matchMedia('(max-width: 860px)');

    if (!mediaMobile.matches && localStorage.getItem(CHAVE) === '1') {
      casca.classList.add('sidebar-fechada');
    }

    function estaAberta() {
      return mediaMobile.matches
        ? sidebar.classList.contains('sidebar-aberta')
        : !casca.classList.contains('sidebar-fechada');
    }

    botao.addEventListener('click', function () {
      if (mediaMobile.matches) {
        sidebar.classList.toggle('sidebar-aberta');
      } else {
        var fechada = casca.classList.toggle('sidebar-fechada');
        localStorage.setItem(CHAVE, fechada ? '1' : '0');
      }
      botao.setAttribute('aria-expanded', estaAberta() ? 'true' : 'false');
    });
  })();
</script>
</body>
</html>
